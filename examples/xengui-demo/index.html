<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>XenGui Demo</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme -->
    <!-- light mode -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <!-- dark mode -->
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta name="apple-mobile-web-app-title" content="XenGui Demo" />

    <link rel="apple-touch-icon" href="./xengui_icon_180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./xengui_favicon.svg" />

    <link data-trunk rel="copy-file" href="./assets/sw.js" />
    <link data-trunk rel="copy-file" href="./assets/manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="./assets/xengui_favicon.svg" />
    <link data-trunk rel="copy-file" href="./assets/xengui_icon.svg" />
    <link data-trunk rel="copy-file" href="./assets/xengui_icon_180.png" />
    <link data-trunk rel="copy-file" href="./assets/xengui_icon_192.png" />
    <link data-trunk rel="copy-file" href="./assets/xengui_icon_512.png" />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
      }
      canvas {
        display: block;
      }
      canvas:focus {
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
    <script>
      // pass native web hotkeys
      window.addEventListener(
        "keydown",
        function (e) {
          const isDevTools =
            e.key === "F12" ||
            e.key === "F11" ||
            e.key === "Escape" ||
            ((e.ctrlKey || e.metaKey) &&
              e.shiftKey &&
              (e.key === "I" || e.key === "i"));
          const isReload =
            (e.ctrlKey || e.metaKey) && (e.key === "r" || e.key === "R");
          const isF5 = e.key === "F5";
          if (isDevTools || isReload || isF5) {
            e.stopPropagation();
          }
        },
        true
      );
    </script>
  </head>
  <body oncontextmenu="return false;">
    <noscript>This app requires WebAssembly enabled in your browser.</noscript>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
