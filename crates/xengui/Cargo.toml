[package]
name = "xengui"
version = "0.1.0"
edition = "2021"
authors = ["randseas <waultbank@gmail.com>"]
description = "wgpu based, modern and high-performance GUI library."
license = "GPLv3"
repository = "https://github.com/randseas/xengui"
readme = "../../README.md"
keywords = ["gui", "wgpu", "winit", "graphics"]
categories = ["gui"]

[dependencies]
wgpu = { workspace = true }
wgpu_glyph = { workspace = true }
winit = { workspace = true }
pollster = { workspace = true }
bytemuck = { workspace = true }
smol_str = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlCanvasElement"] }
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"