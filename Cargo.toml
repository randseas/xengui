[workspace]
resolver = "2"
members = ["crates/xengui", "examples/*"]

[workspace.package]
edition = "2024"
license = "Apache-2.0"
rust-version = "1.92"
version = "0.1.0"

[profile.release]
lto = true
opt-level = 's'

panic = "abort" 

[profile.dev.package."*"]
opt-level = 2

[workspace.dependencies]
xengui = { version = "0.1.0", path = "crates/xengui" }
wgpu = "28.0.0"
wgpu_glyph = "0.28.0"
winit = "0.30.0" 
pollster = "0.4.0"
bytemuck = { version = "1.21.0", features = ["derive"] }
smol_str = "0.3"